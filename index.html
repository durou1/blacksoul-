
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04020a;--bg2:#080412;--bg3:#0c0618;
  --red:#9b0000;--red2:#cc1100;--red3:#ff2200;
  --gold:#c09040;--gold2:#d4a850;
  --txt:#ead8b4;--txt2:#c0986a;--txt3:#a07848;
  --border:#2a1408;--border2:#3e1e0a;
}
body,html{background:transparent;font-family:'Noto Serif SC','SimSun',serif;}
#app{background:var(--bg);color:var(--txt);min-height:600px;position:relative;overflow:hidden;}
/* scanlines */
#app::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:0;}
/* blood drip top */
.blood-top{position:absolute;top:0;left:0;right:0;height:24px;z-index:10;overflow:hidden;}
.drop{position:absolute;top:0;width:3px;background:linear-gradient(#6a0000,#cc1100);border-radius:0 0 3px 3px;animation:drip linear infinite;}
@keyframes drip{0%{height:0;opacity:0}20%{opacity:1}100%{height:24px;opacity:.7}}

/* PAGE FLIP */
#flipper{perspective:1200px;width:100%;position:relative;z-index:2;}
.page{
  width:100%;min-height:560px;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.77,0,.18,1);
  transform-origin:left center;
}
.page.flip-out{animation:flipOut .65s forwards cubic-bezier(.77,0,.18,1);}
.page.flip-in{animation:flipIn .65s forwards cubic-bezier(.22,1,.36,1);}
@keyframes flipOut{0%{transform:rotateY(0)}100%{transform:rotateY(-90deg);opacity:0}}
@keyframes flipIn{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
.inner{max-width:660px;margin:0 auto;padding:20px 14px 30px;}

/* LOGO */
.logo-wrap{text-align:center;padding:28px 0 10px;}
.logo-main{font-size:32px;font-weight:700;letter-spacing:6px;color:var(--red2);text-shadow:0 0 24px #660000,0 0 3px #ff0000;line-height:1;}
.logo-sub{font-size:11px;letter-spacing:10px;color:var(--txt3);margin-top:5px;}
.hdiv{height:1px;background:linear-gradient(90deg,transparent,#550000,#880000,#550000,transparent);margin:12px 0;}
/* FRAME */
.fm{border:1px solid var(--border2);background:rgba(6,2,12,.92);padding:16px 14px;position:relative;margin-bottom:14px;}
.fm .c{position:absolute;color:#3a1a08;font-size:9px;}
.c-tl{top:5px;left:7px}.c-tr{top:5px;right:7px}.c-bl{bottom:5px;left:7px}.c-br{bottom:5px;right:7px}
.spd{color:#6a3a18;letter-spacing:3px;font-size:11px;text-align:center;margin:5px 0;}
.intro-p{font-size:13px;line-height:2.1;color:var(--txt2);text-align:center;}
.intro-p em{color:#cc4422;font-style:normal;}
/* START BTN */
.btn-start{display:block;width:100%;padding:13px;background:var(--bg);border:1px solid var(--red);color:var(--red2);font-size:15px;font-family:'Noto Serif SC',serif;letter-spacing:5px;cursor:pointer;margin-top:12px;transition:all .2s;text-align:center;position:relative;overflow:hidden;}
.btn-start::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(150,0,0,.08) 50%,transparent 100%);transform:translateX(-100%);transition:transform .4s;}
.btn-start:hover::after{transform:translateX(100%);}
.btn-start:hover{background:#10020a;color:var(--red3);border-color:var(--red2);text-shadow:0 0 8px #880000;}
/* PROGRESS */
.prog-wrap{margin-bottom:12px;}
.prog-bar{width:100%;height:3px;background:#0e0608;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#330000,var(--red2));transition:width .5s;}
.prog-txt{font-size:10px;color:var(--txt3);text-align:right;margin-top:3px;letter-spacing:2px;}
/* QUESTION */
.q-num{font-size:10px;color:var(--txt3);letter-spacing:4px;margin-bottom:6px;}
.q-txt{font-size:13.5px;line-height:2;color:var(--txt);margin-bottom:12px;border-left:2px solid #660000;padding-left:12px;position:relative;}
.q-dims{font-size:10px;color:#7a4a20;letter-spacing:3px;margin-bottom:10px;}
/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{
  padding:10px 13px;background:var(--bg);border:1px solid var(--border);
  color:#a88c6a;font-size:12.5px;font-family:'Noto Serif SC',serif;
  cursor:pointer;text-align:left;line-height:1.9;transition:all .15s;
  position:relative;overflow:hidden;
}
.opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:var(--red);transition:width .2s;opacity:.15;}
.opt:hover::before{width:100%;}
.opt:hover{border-color:#660000;color:var(--txt);}
.opt.dark{color:#cc5533;border-color:#660000;background:rgba(80,0,0,0.12);}
.opt.dark:hover{color:#ff7755;border-color:#990000;background:rgba(120,0,0,0.18);}
.opt.dark .dk-mark{color:#883322;margin-right:4px;transition:color .15s;}
.opt.dark:hover .dk-mark{color:#cc4422;}

/* ANIMATED ICONS per question */
.q-anim{font-size:22px;margin-bottom:8px;min-height:30px;text-align:right;padding-right:4px;}
.q-anim span{display:inline-block;}
.bounce{animation:bnc .9s infinite alternate;}
.shake{animation:shk .5s infinite;}
.spin{animation:spn 3s linear infinite;}
.pulse{animation:pls 1.5s infinite alternate;}
.sway{animation:swy 2s infinite ease-in-out;}
.float{animation:flt 2.5s infinite ease-in-out;}
@keyframes bnc{0%{transform:translateY(0)}100%{transform:translateY(-6px)}}
@keyframes shk{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes spn{to{transform:rotate(360deg)}}
@keyframes pls{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.15);opacity:1}}
@keyframes swy{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* RESULT */
.res-name{font-size:34px;font-weight:700;color:var(--red2);letter-spacing:5px;text-shadow:0 0 14px #550000;margin:8px 0 2px;}
.res-title{font-size:12px;color:var(--gold2);letter-spacing:4px;margin-bottom:10px;}
/* CHAR IMG GALLERY */
.char-gallery{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0;}
.char-img-wrap{position:relative;overflow:hidden;}
.char-img-wrap.main-img{flex:0 0 160px;}
.char-img-wrap.side-img{flex:0 0 90px;}
.char-img{width:100%;display:block;border:1px solid #2a0e06;filter:sepia(20%) contrast(1.05) brightness(0.92);transition:filter .3s;image-rendering:auto;}
.char-img:hover{filter:sepia(0%) contrast(1.1) brightness(1);}
.char-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 60%,rgba(4,2,10,.8));pointer-events:none;}
.no-img{width:100%;aspect-ratio:1/1;background:#0a0412;display:flex;align-items:center;justify-content:center;border:1px solid #1a0806;}
.ascii-art{font-size:8px;line-height:1.3;font-family:'Courier New',monospace;color:#5a2a14;white-space:pre;}
/* RESULT DESC */
.res-desc{font-size:12.5px;line-height:2.1;color:var(--txt2);margin:12px 0;}
.res-desc p{margin-bottom:10px;}
.res-desc .quote{border-left:2px solid #550000;padding-left:10px;color:#aa5530;font-size:11.5px;margin:8px 0;}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.tag{padding:2px 9px;border:1px solid #3a1608;font-size:10px;color:#8a5030;letter-spacing:2px;}
/* DIMS */
.dim-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.dim-name{font-size:10px;color:#b07840;width:80px;flex-shrink:0;}
.dim-bg{flex:1;height:5px;background:#0e0608;}
.dim-fill{height:100%;background:linear-gradient(90deg,#330000,var(--red2));width:0;transition:width 1.3s ease-out;}
.dim-pct{font-size:10px;color:#cc4422;width:30px;text-align:right;}
/* BOTTOM BTN */
.btn-sm{display:inline-block;padding:9px 22px;background:var(--bg);border:1px solid var(--border2);color:var(--txt3);font-size:11px;font-family:'Noto Serif SC',serif;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.btn-sm:hover{border-color:var(--red);color:var(--red2);}
.px-strip{font-size:7px;color:#3a1a08;text-align:center;letter-spacing:1px;overflow:hidden;white-space:nowrap;user-select:none;}
/* FLICKER CANDLE */
.flk{animation:flk 2s infinite alternate;display:inline-block;}
@keyframes flk{0%{opacity:.55;text-shadow:0 0 3px #cc2200}100%{opacity:1;text-shadow:0 0 12px #ff4400,0 0 4px #ff2200}}
/* MUSIC BTN */
#mBtn{position:fixed;bottom:14px;right:14px;z-index:999;width:34px;height:34px;background:var(--bg);border:1px solid var(--border2);color:var(--txt3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:serif;}
#mBtn.on{color:var(--red2);border-color:var(--red);animation:mPls 2s infinite alternate;}
@keyframes mPls{0%{box-shadow:0 0 0 0 #66000000}100%{box-shadow:0 0 8px 2px #66000066}}
/* NOTE FLOAT */
.note{position:fixed;pointer-events:none;z-index:998;font-size:12px;color:#550000;animation:noteFloat 2.5s forwards ease-out;}
@keyframes noteFloat{0%{opacity:0;transform:translateY(0) scale(.8)}20%{opacity:.7}100%{opacity:0;transform:translateY(-80px) scale(1.1)}}
</style>

    opts:[

/* ---- STATE ---- */
let st={phase:'intro',q:0,sc:{K:0,L:0,B:0,S:0,M:0,R:0},dark:0,result:null};
let musicOn=false;

/* blood drips */
function initBlood(){
  const c=document.getElementById('bloodTop');
  if(!c)return;
  for(let i=0;i<14;i++){
    const d=document.createElement('div');
    d.className='drop';
    d.style.left=Math.random()*100+'%';
    d.style.animationDuration=(.8+Math.random()*1.4)+'s';
    d.style.animationDelay=(Math.random()*2)+'s';
    d.style.height=Math.round(8+Math.random()*16)+'px';
    d.style.width=(2+Math.random()*2)+'px';
    c.appendChild(d);
  }
}

function calcChar(){
  if(st.dark>=6) return CHARS.find(c=>c.id==='ALICE01');
  if(st.dark>=4) return CHARS.find(c=>c.id==='LORDE');
  /* 按优先级排序：条件最严格的先匹配 */
  const priority=['REIK','BAPHOMET','MIRANDA','ALICE_L','LIEVRE','JEANNE','LORINA','DOROTHY','HISSHA','ELRUMA','CHESHIRE','DODO','BILL'];
  for(const id of priority){
    const ch=CHARS.find(c=>c.id===id);
    if(ch&&ch.cond(st.sc)) return ch;
  }
  return CHARS.find(c=>c.id==='GRIM');
}

function imgUrl(fn){
  return BASE+encodeURIComponent(fn);
}

function buildImgGallery(imgs){
  if(!imgs||!imgs.length) return '';
  const main=imgs.find(i=>i.main)||imgs[0];
  const sides=imgs.filter(i=>!i.main);
  let html=`<div class="char-gallery">`;
  html+=`<div class="char-img-wrap main-img"><img class="char-img" src="${imgUrl(main.f)}" onerror="this.parentNode.innerHTML='<div class=\\'no-img\\'><div class=\\'ascii-art\\'>?</div></div>'" loading="lazy"></div>`;
  sides.forEach(s=>{
    html+=`<div class="char-img-wrap side-img"><img class="char-img" src="${imgUrl(s.f)}" onerror="this.style.display='none'" loading="lazy"></div>`;
  });
  html+=`</div>`;
  return html;
}

function flipTo(htmlFn){
  const page=document.getElementById('page');
  page.classList.add('flip-out');
  setTimeout(()=>{
    page.classList.remove('flip-out');
    const inner=document.getElementById('inner');
    inner.innerHTML=htmlFn();
    page.classList.add('flip-in');
    setTimeout(()=>page.classList.remove('flip-in'),700);
    window.scrollTo({top:0,behavior:'smooth'});
  },640);
}

/* ---- RENDER ---- */
function renderIntro(){
  return `

  <div class="px-strip">▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓</div>
  <div class="logo-main" style="margin-top:14px">BLACK SOULS</div>
  <div class="logo-sub">人格测试 ∙ 黑童话特供版</div>
  <div class="hdiv"></div>
</div>
<div class="fm">
  <span class="c c-tl">✦</span><span class="c c-tr">✦</span><span class="c c-bl">✦</span><span class="c c-br">✦</span>

  </div>

  <button class="btn-start" onclick="startTest()"><span class="flk">🕯</span>&nbsp;&nbsp;点燃篝火，开始轮回&nbsp;&nbsp;<span class="flk">🕯</span></button>
</div>
<div class="px-strip">▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓</div>`;

function renderQ(){
  const q=QS[st.q];
  const pct=Math.round(st.q/QS.length*100);
  const opts=q.opts.map((o,i)=>`
    <button class="opt${o.dark?' dark':''}" onclick="doAnswer(${i})" ${o.dark?'':''}>
      ${o.dark?'<span class="dk-mark" style="color:#cc3300;margin-right:4px">▌</span>':''}${o.t}
    </button>`).join('');
  return `
<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  <div class="prog-txt">${st.q+1} / ${QS.length} ∙ ${q.dims}</div>
</div>
<div class="fm">
  <span class="c c-tl">✦</span><span class="c c-tr">✦</span><span class="c c-bl">✦</span><span class="c c-br">✦</span>
  <div class="q-anim">${q.anim}</div>
  <div class="q-num">【第 ${String(st.q+1).padStart(2,'0')} 题】</div>
  <div class="q-txt">${q.txt}</div>
  <div class="opts">${opts}</div>
</div>
<div style="font-size:10px;color:#7a5030;text-align:center;letter-spacing:2px;margin-top:6px">「每一个选择，都会成为你灵魂的一部分」</div>`;
}

function renderResult(){
  const ch=st.result;
  const MAX=20;
  const bars=DIMS.map(d=>{
    const v=Math.min(st.sc[d.id]||0,MAX);
    const p=Math.round(v/MAX*100);
    return `<div class="dim-row">
      <div class="dim-name">${d.name}</div>
      <div class="dim-bg"><div class="dim-fill" id="df_${d.id}"></div></div>
      <div class="dim-pct" id="dp_${d.id}">0%</div>
    </div>`;
  }).join('');

  const descHtml=ch.desc.map(p=>{
    if(p.includes('\n'))return p.split('\n').map((l,i)=>i===0?`<p>${l}</p>`:`<p style="padding-left:8px;color:#b08060">${l}</p>`).join('');
    return `<p>${p}</p>`;
  }).join('');

  return `
<div class="res-wrap" style="text-align:center">
  <div class="px-strip">▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓</div>
  <div style="font-size:10px;letter-spacing:6px;color:#5a2a10;margin:10px 0 2px">∙ 你的黑之灵魂 ∙</div>
  <div class="res-name">${ch.name}</div>
  <div class="res-title">${ch.title}</div>
  ${buildImgGallery(ch.imgs)}
  <div class="hdiv"></div>
  <div class="fm" style="text-align:left">
    <span class="c c-tl">✦</span><span class="c c-tr">✦</span><span class="c c-bl">✦</span><span class="c c-br">✦</span>
    <div class="res-desc">${descHtml}</div>
    <div class="res-desc quote" style="border-left:2px solid #550000;padding-left:10px;color:#aa5530;font-size:11.5px;font-style:italic">「${ch.quote}」</div>
    <div class="tags">${ch.tags.map(t=>`<span class="tag">♠ ${t}</span>`).join('')}</div>
  </div>
  <div class="fm">
    <span class="c c-tl">✦</span><span class="c c-tr">✦</span><span class="c c-bl">✦</span><span class="c c-br">✦</span>
    <div style="font-size:10px;letter-spacing:4px;color:#5a2a10;margin-bottom:10px;text-align:center">∙ 六维灵魂分析 ∙</div>
    ${bars}
  </div>
  <div class="spd">♠ ♠ ♠ ♠ ♠ ♠ ♠ ♠ ♠ ♠ ♠ ♠ ♠</div>
  <button class="btn-sm" onclick="doReset()">↺ 再次轮回</button>
  <div class="px-strip" style="margin-top:12px">▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓</div>
</div>`;
}

/* ---- ACTIONS ---- */
function startTest(){
  flipTo(()=>{st.phase='quiz';st.q=0;return renderQ();});
}
function doAnswer(i){
  const q=QS[st.q];
  const o=q.opts[i];
  if(o.dark) st.dark++;
  for(const[d,v] of Object.entries(o.v)) st.sc[d]=(st.sc[d]||0)+v;
  st.q++;
  if(st.q>=QS.length){
    st.result=calcChar();
    st.phase='result';
    flipTo(()=>renderResult());
    setTimeout(animateBars,900);
  } else {
    flipTo(()=>renderQ());
  }
}
function doReset(){
  st={phase:'intro',q:0,sc:{K:0,L:0,B:0,S:0,M:0,R:0},dark:0,result:null};
  flipTo(()=>renderIntro());
}
function animateBars(){
  const MAX=20;
  DIMS.forEach(d=>{
    const v=Math.min(st.sc[d.id]||0,MAX);
    const p=Math.round(v/MAX*100);
    const el=document.getElementById('df_'+d.id);
    const el2=document.getElementById('dp_'+d.id);
    if(el){el.style.width=p+'%';}
    if(el2){el2.textContent=p+'%';}
  });
}

/* ---- MUSIC ---- */
function toggleMusic(){
  const a=document.getElementById('bgm');
  const b=document.getElementById('mBtn');
  if(!a.src||a.readyState===0){
    a.src=BGM;
    a.volume=0.45;
    a.load();
  }
  musicOn=!musicOn;
  if(musicOn){
    a.play().catch(()=>{});
    b.classList.add('on');
    spawnNotes();
  } else {
    a.pause();
    b.classList.remove('on');
  }
}
function spawnNotes(){
  if(!musicOn)return;
  const notes=['♩','♪','♫','♬'];
  const n=document.createElement('div');
  n.className='note';
  n.textContent=notes[Math.floor(Math.random()*notes.length)];
  n.style.bottom='50px';
  n.style.right=(14+Math.random()*40)+'px';
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),2600);
  setTimeout(spawnNotes,1200+Math.random()*1000);
}

/* ---- INIT ---- */
document.getElementById('inner').innerHTML=renderIntro();
initBlood();
</script>
